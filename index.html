<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STORY作成クン - 1990年代風ストーリー作成アプリ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'MS Sans Serif', 'Noto Sans JP', Arial, sans-serif;
            background: linear-gradient(135deg, #00FFFF 0%, #FF00FF 50%, #00FF00 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .window {
            background: #C0C0C0;
            border: 2px solid;
            border-color: #FFFFFF #808080 #808080 #FFFFFF;
            box-shadow: inset 1px 1px 0 #DFDFDF, inset -1px -1px 0 #404040;
            margin-bottom: 20px;
        }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1084D7);
            color: white;
            padding: 2px 2px 2px 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
        }

        .title-bar-buttons {
            display: flex;
            gap: 2px;
        }

        .title-bar-button {
            width: 16px;
            height: 14px;
            background: #C0C0C0;
            border: 1px solid;
            border-color: #FFFFFF #808080 #808080 #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .title-bar-button:active {
            border-color: #808080 #FFFFFF #FFFFFF #808080;
        }

        .window-content {
            padding: 4px;
        }

        .button {
            background: #C0C0C0;
            border: 2px solid;
            border-color: #FFFFFF #808080 #808080 #FFFFFF;
            padding: 4px 12px;
            font-family: 'MS Sans Serif', 'Noto Sans JP', Arial, sans-serif;
            font-size: 14px;
            cursor: pointer;
            min-width: 75px;
            text-align: center;
        }

        .button:active {
            border-color: #808080 #FFFFFF #FFFFFF #808080;
        }

        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .canvas-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: #C0C0C0;
            border: 2px inset #DFDFDF;
            cursor: move;
            position: relative;
        }

        canvas {
            border: 2px solid #808080;
            background: white;
            touch-action: none;
        }

        .resize-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #0000FF;
            border: 1px solid #FFFFFF;
            cursor: nwse-resize;
            display: none;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
        }

        .controls input[type="file"] {
            padding: 4px;
        }

        .panel {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .properties-panel {
            flex: 1;
            background: #C0C0C0;
            border: 2px inset #DFDFDF;
            padding: 10px;
            min-width: 200px;
        }

        .properties-panel h3 {
            background: linear-gradient(90deg, #000080, #1084D7);
            color: white;
            padding: 2px 4px;
            margin: -10px -10px 10px -10px;
            font-size: 14px;
        }

        .property-group {
            margin-bottom: 10px;
        }

        .property-group label {
            display: block;
            margin-bottom: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .property-group input,
        .property-group select {
            width: 100%;
            padding: 4px;
            font-family: 'MS Sans Serif', 'Noto Sans JP', Arial, sans-serif;
            border: 2px solid;
            border-color: #808080 #FFFFFF #FFFFFF #808080;
        }

        .property-group input[type="range"] {
            width: 100%;
        }

        .property-group input[type="color"] {
            width: 100%;
            height: 30px;
        }

        .layers-list {
            border: 1px inset #DFDFDF;
            padding: 5px;
            max-height: 200px;
            overflow-y: auto;
        }

        .layer-item {
            padding: 4px;
            margin: 2px 0;
            background: #FFFFFF;
            border: 1px solid #808080;
            cursor: pointer;
            font-size: 12px;
        }

        .layer-item.selected {
            background: #000080;
            color: white;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .panel {
                flex-direction: column;
            }

            .controls {
                flex-direction: column;
            }

            .button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="window">
            <div class="title-bar">
                <span>STORY作成クン</span>
                <div class="title-bar-buttons">
                    <button class="title-bar-button">_</button>
                    <button class="title-bar-button">□</button>
                    <button class="title-bar-button">×</button>
                </div>
            </div>
            <div class="window-content">
                <div class="controls">
                    <input type="file" id="imageInput" accept="image/*">
                    <button class="button" onclick="addText()">テキスト追加</button>
                    <button class="button" onclick="undo()" id="undoBtn">↶ 戻す</button>
                    <button class="button" onclick="redo()" id="redoBtn">↷ やり直す</button>
                    <button class="button" onclick="saveStory()">💾 保存</button>
                    <button class="button" onclick="loadStory()">📂 読込</button>
                    <button class="button" onclick="downloadImage()">⬇ ダウンロード</button>
                </div>

                <div class="canvas-container" id="canvasContainer">
                    <canvas id="canvas" width="270" height="480"></canvas>
                    <div class="resize-handle" id="resizeHandle"></div>
                </div>

                <div class="panel">
                    <div class="properties-panel">
                        <h3>プロパティ</h3>
                        <div class="property-group">
                            <label>背景色:</label>
                            <select id="backgroundSelect" onchange="changeBackground()">
                                <option value="#E0E0E0">グレー</option>
                                <option value="#00FFFF">シアン</option>
                                <option value="#FF00FF">マゼンタ</option>
                                <option value="#00FF00">ライムグリーン</option>
                                <option value="#FFFF00">イエロー</option>
                                <option value="#FFA500">オレンジ</option>
                                <option value="#FFFFFF">ホワイト</option>
                                <option value="#000000">ブラック</option>
                            </select>
                        </div>
                        <div class="property-group">
                            <label>フィルター:</label>
                            <select id="filterSelect" onchange="applyFilter()">
                                <option value="none">なし</option>
                                <option value="sepia">セピア</option>
                                <option value="grayscale">モノクロ</option>
                                <option value="neon">ネオン</option>
                                <option value="retro">レトロ</option>
                                <option value="invert">反転</option>
                            </select>
                        </div>
                        <div class="property-group" id="commonPropertiesPanel">
                            <label>不透明度: <span id="opacityValue">100%</span></label>
                            <input type="range" id="opacitySlider" min="0" max="100" value="100" onchange="updateSelectedElement()">
                            <label>回転: <span id="rotationValue">0°</span></label>
                            <input type="range" id="rotationSlider" min="0" max="360" value="0" onchange="updateSelectedElement()">
                        </div>
                        <div class="property-group" id="imagePropertiesPanel" class="hidden">
                            <label>幅:</label>
                            <input type="number" id="imageWidthInput" min="10" onchange="updateSelectedElement()">
                            <label>高さ:</label>
                            <input type="number" id="imageHeightInput" min="10" onchange="updateSelectedElement()">
                            <label>アスペクト比:</label>
                            <select id="aspectRatioSelect" onchange="updateSelectedElement()">
                                <option value="free">自由</option>
                                <option value="original">元画像</option>
                                <option value="1:1">1:1 (正方形)</option>
                                <option value="4:3">4:3</option>
                                <option value="16:9">16:9</option>
                                <option value="3:4">3:4</option>
                                <option value="9:16">9:16</option>
                            </select>
                        </div>
                        <div class="property-group" id="textPropertiesPanel" class="hidden">
                            <label>フォント:</label>
                            <select id="fontSelect" onchange="updateSelectedElement()">
                                <option value="'MS ゴシック', sans-serif">MS ゴシック</option>
                                <option value="'Noto Sans JP', sans-serif">Noto Sans JP</option>
                                <option value="'DotGothic16', sans-serif">DotGothic16 (ドット)</option>
                                <option value="'Zen Maru Gothic', sans-serif">Zen Maru Gothic (丸)</option>
                                <option value="Arial">Arial</option>
                                <option value="Georgia">Georgia</option>
                                <option value="Times New Roman">Times New Roman</option>
                                <option value="Courier New">Courier New</option>
                                <option value="Verdana">Verdana</option>
                                <option value="Comic Sans MS">Comic Sans MS</option>
                            </select>
                            <label>フォントサイズ:</label>
                            <input type="number" id="fontSizeInput" min="8" max="72" onchange="updateSelectedElement()">
                            <label>色:</label>
                            <input type="color" id="textColorInput" onchange="updateSelectedElement()">
                        </div>
                        <button class="button" onclick="deleteSelectedElement()" style="width: 100%; margin-top: 10px;">削除</button>
                    </div>

                    <div class="properties-panel">
                        <h3>レイヤー</h3>
                        <div class="layers-list" id="layersList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== 定数 =====
        const CANVAS_WIDTH = 270;
        const CANVAS_HEIGHT = 480;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const imageInput = document.getElementById('imageInput');
        const canvasContainer = document.getElementById('canvasContainer');
        const resizeHandle = document.getElementById('resizeHandle');

        // ===== グローバル変数 =====
        let elements = [];
        let selectedElementId = null;
        let draggingElementId = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        let resizingElementId = null;
        let backgroundColor = '#E0E0E0';
        let currentFilter = 'none';
        let nextId = 1;

        // ===== 履歴管理 =====
        class History {
            constructor() {
                this.undoStack = [];
                this.redoStack = [];
            }

            saveState(state) {
                this.undoStack.push(JSON.parse(JSON.stringify(state)));
                this.redoStack = [];
                updateHistoryButtons();
            }

            undo() {
                if (this.undoStack.length > 0) {
                    this.redoStack.push(JSON.parse(JSON.stringify(getCurrentState())));
                    const previousState = this.undoStack.pop();
                    restoreState(previousState);
                    updateHistoryButtons();
                }
            }

            redo() {
                if (this.redoStack.length > 0) {
                    this.undoStack.push(JSON.parse(JSON.stringify(getCurrentState())));
                    const nextState = this.redoStack.pop();
                    restoreState(nextState);
                    updateHistoryButtons();
                }
            }

            canUndo() {
                return this.undoStack.length > 0;
            }

            canRedo() {
                return this.redoStack.length > 0;
            }
        }

        const history = new History();

        function getCurrentState() {
            return {
                elements: JSON.parse(JSON.stringify(elements.map(el => ({
                    id: el.id,
                    type: el.type,
                    x: el.x,
                    y: el.y,
                    width: el.width,
                    height: el.height,
                    rotation: el.rotation,
                    opacity: el.opacity,
                    aspectRatio: el.aspectRatio,
                    originalAspectRatio: el.originalAspectRatio,
                    data: el.type === 'text' ? el.data : null,
                    imageData: el.type === 'image' ? el.data.src : null
                })))),
                backgroundColor: backgroundColor,
                currentFilter: currentFilter
            };
        }

        function restoreState(state) {
            elements = [];
            backgroundColor = state.backgroundColor;
            currentFilter = state.currentFilter;
            nextId = 1;

            state.elements.forEach(el => {
                if (el.type === 'text') {
                    const textEl = new CanvasElement('text', el.data);
                    textEl.id = el.id;
                    textEl.x = el.x;
                    textEl.y = el.y;
                    textEl.width = el.width;
                    textEl.height = el.height;
                    textEl.rotation = el.rotation;
                    textEl.opacity = el.opacity;
                    elements.push(textEl);
                    nextId = Math.max(nextId, el.id + 1);
                } else if (el.type === 'image' && el.imageData) {
                    const img = new Image();
                    img.src = el.imageData;
                    img.onload = () => {
                        const imgEl = new CanvasElement('image', img);
                        imgEl.id = el.id;
                        imgEl.x = el.x;
                        imgEl.y = el.y;
                        imgEl.width = el.width;
                        imgEl.height = el.height;
                        imgEl.rotation = el.rotation;
                        imgEl.opacity = el.opacity;
                        imgEl.aspectRatio = el.aspectRatio;
                        imgEl.originalAspectRatio = el.originalAspectRatio;
                        elements.push(imgEl);
                        nextId = Math.max(nextId, el.id + 1);
                        redrawCanvas();
                    };
                }
            });

            document.getElementById('backgroundSelect').value = backgroundColor;
            document.getElementById('filterSelect').value = currentFilter;
            redrawCanvas();
            updateLayersList();
        }

        // ===== キャンバス要素クラス =====
        class CanvasElement {
            constructor(type, data) {
                this.id = nextId++;
                this.type = type;
                this.data = data;
                this.x = 10;
                this.y = 10;
                this.width = 100;
                this.height = 100;
                this.rotation = 0;
                this.opacity = 1;
                this.aspectRatio = 'free';
                this.originalAspectRatio = 1;

                if (type === 'image' && data instanceof Image) {
                    this.originalAspectRatio = data.width / data.height;
                    this.width = 100;
                    this.height = 100 / this.originalAspectRatio;
                    this.aspectRatio = 'original';
                }
            }
        }

        // ===== 画像追加 =====
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const element = new CanvasElement('image', img);
                        elements.push(element);
                        history.saveState(getCurrentState());
                        redrawCanvas();
                        updateLayersList();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // ===== テキスト追加 =====
        function addText() {
            const text = prompt('テキストを入力してください:');
            if (text) {
                const element = new CanvasElement('text', {
                    content: text,
                    fontSize: 24,
                    color: '#000000',
                    fontFamily: "'MS ゴシック', sans-serif"
                });
                elements.push(element);
                history.saveState(getCurrentState());
                redrawCanvas();
                updateLayersList();
            }
        }

        // ===== 背景色変更 =====
        function changeBackground() {
            backgroundColor = document.getElementById('backgroundSelect').value;
            history.saveState(getCurrentState());
            redrawCanvas();
        }

        // ===== フィルター適用 =====
        function applyFilter() {
            currentFilter = document.getElementById('filterSelect').value;
            history.saveState(getCurrentState());
            redrawCanvas();
        }

        function getFilteredImageData(imgData) {
            const data = imgData.data;

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];

                if (currentFilter === 'sepia') {
                    data[i] = Math.min(255, r * 1.2);
                    data[i + 1] = Math.min(255, g * 1.1);
                    data[i + 2] = Math.min(255, b * 0.8);
                } else if (currentFilter === 'grayscale') {
                    const gray = r * 0.299 + g * 0.587 + b * 0.114;
                    data[i] = gray;
                    data[i + 1] = gray;
                    data[i + 2] = gray;
                } else if (currentFilter === 'neon') {
                    data[i] = 255 - r;
                    data[i + 1] = 255 - g;
                    data[i + 2] = 255 - b;
                } else if (currentFilter === 'retro') {
                    data[i] = Math.floor(r / 64) * 64;
                    data[i + 1] = Math.floor(g / 64) * 64;
                    data[i + 2] = Math.floor(b / 64) * 64;
                } else if (currentFilter === 'invert') {
                    data[i] = 255 - r;
                    data[i + 1] = 255 - g;
                    data[i + 2] = 255 - b;
                }
            }

            return imgData;
        }

        // ===== 要素選択 =====
        function selectElement(elementId) {
            selectedElementId = elementId;
            updatePropertiesPanel();
            updateLayersList();
            redrawCanvas();
        }

        // ===== プロパティパネル更新 =====
        function updatePropertiesPanel() {
            const element = elements.find(el => el.id === selectedElementId);

            if (!element) {
                document.getElementById('commonPropertiesPanel').classList.add('hidden');
                document.getElementById('imagePropertiesPanel').classList.add('hidden');
                document.getElementById('textPropertiesPanel').classList.add('hidden');
                return;
            }

            document.getElementById('commonPropertiesPanel').classList.remove('hidden');
            document.getElementById('opacitySlider').value = Math.round(element.opacity * 100);
            document.getElementById('opacityValue').textContent = Math.round(element.opacity * 100) + '%';
            document.getElementById('rotationSlider').value = element.rotation;
            document.getElementById('rotationValue').textContent = element.rotation + '°';

            if (element.type === 'image') {
                document.getElementById('imagePropertiesPanel').classList.remove('hidden');
                document.getElementById('textPropertiesPanel').classList.add('hidden');
                document.getElementById('imageWidthInput').value = Math.round(element.width);
                document.getElementById('imageHeightInput').value = Math.round(element.height);
                document.getElementById('aspectRatioSelect').value = element.aspectRatio;
            } else if (element.type === 'text') {
                document.getElementById('imagePropertiesPanel').classList.add('hidden');
                document.getElementById('textPropertiesPanel').classList.remove('hidden');
                const fontSelect = document.getElementById('fontSelect');
                fontSelect.value = element.data.fontFamily;
                if (fontSelect.value !== element.data.fontFamily) {
                    fontSelect.value = "'MS ゴシック', sans-serif";
                }
                document.getElementById('fontSizeInput').value = element.data.fontSize;
                document.getElementById('textColorInput').value = element.data.color;
            }
        }

        // ===== 選択要素更新 =====
        function updateSelectedElement() {
            const element = elements.find(el => el.id === selectedElementId);
            if (!element) return;

            element.opacity = document.getElementById('opacitySlider').value / 100;
            element.rotation = parseInt(document.getElementById('rotationSlider').value);

            if (element.type === 'image') {
                const newWidth = parseInt(document.getElementById('imageWidthInput').value);
                const newHeight = parseInt(document.getElementById('imageHeightInput').value);
                const aspectRatio = document.getElementById('aspectRatioSelect').value;

                element.aspectRatio = aspectRatio;

                if (aspectRatio === 'original') {
                    element.width = newWidth;
                    element.height = newWidth / element.originalAspectRatio;
                } else if (aspectRatio === '1:1') {
                    element.width = newWidth;
                    element.height = newWidth;
                } else if (aspectRatio === '4:3') {
                    element.width = newWidth;
                    element.height = newWidth * 3 / 4;
                } else if (aspectRatio === '16:9') {
                    element.width = newWidth;
                    element.height = newWidth * 9 / 16;
                } else if (aspectRatio === '3:4') {
                    element.width = newWidth;
                    element.height = newWidth * 4 / 3;
                } else if (aspectRatio === '9:16') {
                    element.width = newWidth;
                    element.height = newWidth * 16 / 9;
                } else {
                    element.width = newWidth;
                    element.height = newHeight;
                }
            } else if (element.type === 'text') {
                element.data.fontFamily = document.getElementById('fontSelect').value;
                element.data.fontSize = parseInt(document.getElementById('fontSizeInput').value);
                element.data.color = document.getElementById('textColorInput').value;
            }

            history.saveState(getCurrentState());
            redrawCanvas();
            updatePropertiesPanel();
        }

        // ===== 要素削除 =====
        function deleteSelectedElement() {
            elements = elements.filter(el => el.id !== selectedElementId);
            selectedElementId = null;
            history.saveState(getCurrentState());
            redrawCanvas();
            updateLayersList();
            updatePropertiesPanel();
        }

        // ===== レイヤーリスト更新 =====
        function updateLayersList() {
            const layersList = document.getElementById('layersList');
            layersList.innerHTML = '';

            elements.forEach((el, index) => {
                const layerItem = document.createElement('div');
                layerItem.className = 'layer-item';
                if (el.id === selectedElementId) layerItem.classList.add('selected');

                const label = el.type === 'image' ? '画像' : `テキスト: ${el.data.content.substring(0, 20)}`;
                layerItem.textContent = label;
                layerItem.onclick = () => selectElement(el.id);

                layersList.appendChild(layerItem);
            });
        }

        // ===== 履歴ボタン更新 =====
        function updateHistoryButtons() {
            document.getElementById('undoBtn').disabled = !history.canUndo();
            document.getElementById('redoBtn').disabled = !history.canRedo();
        }

        // ===== Undo/Redo =====
        function undo() {
            history.undo();
            updatePropertiesPanel();
            updateLayersList();
        }

        function redo() {
            history.redo();
            updatePropertiesPanel();
            updateLayersList();
        }

        // ===== 保存・読込 =====
        function saveStory() {
            const stories = JSON.parse(localStorage.getItem('stories') || '[]');
            const newStory = {
                id: Date.now(),
                timestamp: new Date().toLocaleString('ja-JP'),
                state: getCurrentState()
            };
            stories.push(newStory);
            localStorage.setItem('stories', JSON.stringify(stories));
            alert('ストーリーを保存しました！');
        }

        function loadStory() {
            const stories = JSON.parse(localStorage.getItem('stories') || '[]');
            if (stories.length === 0) {
                alert('保存されたストーリーがありません');
                return;
            }

            let storyList = 'クリックして読み込み:\n\n';
            stories.forEach((story, index) => {
                storyList += `${index + 1}. ${story.timestamp}\n`;
            });

            const index = prompt(storyList + '\n読み込むストーリー番号を入力してください (1-' + stories.length + '):');
            if (index && index >= 1 && index <= stories.length) {
                restoreState(stories[index - 1].state);
                updateLayersList();
                updatePropertiesPanel();
            }
        }

        // ===== ダウンロード（iOS対応） =====
        function downloadImage() {
            try {
                canvas.toBlob((blob) => {
                    if (blob) {
                        const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
                        const isAndroid = /Android/.test(navigator.userAgent);
                        
                        if ((isIOS || isAndroid) && navigator.share) {
                            const file = new File([blob], 'story.png', { type: 'image/png' });
                            navigator.share({
                                files: [file],
                                title: 'STORY作成クン',
                                text: '作成したストーリー'
                            }).catch(() => {
                                downloadBlob(blob);
                            });
                        } else {
                            downloadBlob(blob);
                        }
                    }
                }, 'image/png');
            } catch (e) {
                downloadBlob(null);
            }
        }

        function downloadBlob(blob) {
            if (blob) {
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'story.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setTimeout(() => URL.revokeObjectURL(url), 100);
            } else {
                const link = document.createElement('a');
                link.href = canvas.toDataURL('image/png');
                link.download = 'story.png';
                link.click();
            }
        }

        // ===== ドラッグ・リサイズ =====
        function startDragging(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches?.[0]?.clientX) - rect.left;
            const y = (e.clientY || e.touches?.[0]?.clientY) - rect.top;

            // リサイズハンドルをチェック
            const element = elements.find(el => el.id === selectedElementId);
            if (element && isNearResizeHandle(x, y, element)) {
                resizingElementId = selectedElementId;
                return;
            }

            // 要素をクリック
            for (let i = elements.length - 1; i >= 0; i--) {
                const el = elements[i];
                if (x >= el.x && x <= el.x + el.width && y >= el.y && y <= el.y + el.height) {
                    selectElement(el.id);
                    draggingElementId = el.id;
                    dragOffsetX = x - el.x;
                    dragOffsetY = y - el.y;
                    return;
                }
            }

            selectedElementId = null;
            updatePropertiesPanel();
            redrawCanvas();
        }

        function isNearResizeHandle(x, y, element) {
            const handleSize = 15;
            const ex = element.x + element.width;
            const ey = element.y + element.height;
            return x >= ex - handleSize && x <= ex && y >= ey - handleSize && y <= ey;
        }

        function drag(e) {
            if (resizingElementId) {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches?.[0]?.clientX) - rect.left;
                const y = (e.clientY || e.touches?.[0]?.clientY) - rect.top;

                const element = elements.find(el => el.id === resizingElementId);
                if (element) {
                    const newWidth = Math.max(20, Math.min(CANVAS_WIDTH - element.x, x - element.x));
                    const newHeight = Math.max(20, Math.min(CANVAS_HEIGHT - element.y, y - element.y));

                    if (element.type === 'image') {
                        const aspectRatio = element.aspectRatio;
                        if (aspectRatio === 'original') {
                            element.width = newWidth;
                            element.height = newWidth / element.originalAspectRatio;
                        } else if (aspectRatio === '1:1') {
                            element.width = newWidth;
                            element.height = newWidth;
                        } else if (aspectRatio === '4:3') {
                            element.width = newWidth;
                            element.height = newWidth * 3 / 4;
                        } else if (aspectRatio === '16:9') {
                            element.width = newWidth;
                            element.height = newWidth * 9 / 16;
                        } else if (aspectRatio === '3:4') {
                            element.width = newWidth;
                            element.height = newWidth * 4 / 3;
                        } else if (aspectRatio === '9:16') {
                            element.width = newWidth;
                            element.height = newWidth * 16 / 9;
                        } else {
                            element.width = newWidth;
                            element.height = newHeight;
                        }
                    } else {
                        element.width = newWidth;
                        element.height = newHeight;
                    }

                    redrawCanvas();
                    updatePropertiesPanel();
                }
                return;
            }

            if (!draggingElementId) return;

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches?.[0]?.clientX) - rect.left;
            const y = (e.clientY || e.touches?.[0]?.clientY) - rect.top;

            const element = elements.find(el => el.id === draggingElementId);
            if (element) {
                element.x = Math.max(0, Math.min(CANVAS_WIDTH - element.width, x - dragOffsetX));
                element.y = Math.max(0, Math.min(CANVAS_HEIGHT - element.height, y - dragOffsetY));
                redrawCanvas();
            }
        }

        function stopDragging() {
            if (draggingElementId || resizingElementId) {
                history.saveState(getCurrentState());
                draggingElementId = null;
                resizingElementId = null;
            }
        }

        canvas.addEventListener('mousedown', startDragging);
        canvas.addEventListener('mousemove', drag);
        canvas.addEventListener('mouseup', stopDragging);
        canvas.addEventListener('mouseleave', stopDragging);

        canvas.addEventListener('touchstart', startDragging, { passive: false });
        canvas.addEventListener('touchmove', drag, { passive: false });
        canvas.addEventListener('touchend', stopDragging);
        canvas.addEventListener('touchcancel', stopDragging);

        function redrawCanvas() {
            ctx.fillStyle = backgroundColor;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            elements.forEach((el) => {
                ctx.save();
                ctx.globalAlpha = el.opacity;
                ctx.translate(el.x + el.width / 2, el.y + el.height / 2);
                ctx.rotate((el.rotation * Math.PI) / 180);

                if (el.type === 'image') {
                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = el.width;
                    tempCanvas.height = el.height;
                    const tempCtx = tempCanvas.getContext('2d');
                    tempCtx.drawImage(el.data, 0, 0, el.width, el.height);

                    if (currentFilter !== 'none') {
                        const imgData = tempCtx.getImageData(0, 0, el.width, el.height);
                        const filteredData = getFilteredImageData(imgData);
                        tempCtx.putImageData(filteredData, 0, 0);
                    }

                    ctx.drawImage(tempCanvas, -el.width / 2, -el.height / 2);
                } else if (el.type === 'text') {
                    ctx.fillStyle = el.data.color;
                    ctx.font = `${el.data.fontSize}px ${el.data.fontFamily}`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(el.data.content, 0, 0);
                }

                ctx.restore();

                if (selectedElementId === el.id) {
                    ctx.strokeStyle = '#0000FF';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    ctx.strokeRect(el.x, el.y, el.width, el.height);
                    ctx.setLineDash([]);

                    // リサイズハンドル表示
                    ctx.fillStyle = '#0000FF';
                    ctx.fillRect(el.x + el.width - 8, el.y + el.height - 8, 8, 8);
                }
            });
        }

        updateHistoryButtons();
        redrawCanvas();
    </script>
</body>
</html>
